<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced ChatGPT Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Advanced ChatGPT Clone</h1>
            <p>Pure frontend implementation with code execution</p>
        </header>

        <div class="chat-container">
            <div class="messages" id="messages">
                <!-- Messages will appear here -->
            </div>

            <div class="input-container centered" id="inputContainer">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Ask me anything or request code..." autocomplete="off">
                    <button id="sendButton"><i class="fas fa-paper-plane"></i></button>
                </div>
                <p class="disclaimer">This is a frontend demo with simulated AI responses</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
